services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sellmmo-app:latest
    container_name: sellmmo-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    image: sellmmo-app:latest
    container_name: sellmmo-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    image: sellmmo-app:latest
    container_name: sellmmo-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: sellmmo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - app-storage:/var/www/html/storage
    depends_on:
      - app

  mariadb:
    image: mariadb:10.6
    container_name: sellmmo-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-sellmmo}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MARIADB_PASSWORD: ${DB_PASSWORD:-password}
      MARIADB_USER: ${DB_USERNAME:-sellmmo}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$$MARIADB_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sellmmo-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  mariadb-data:
  redis-data:
  app-storage:
  app-cache:
