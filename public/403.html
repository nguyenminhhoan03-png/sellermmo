<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Không Có Quyền Truy Cập</title>
    <style>
        body {
            background-color: #f4f6f9;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 50px 40px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            position: relative;
        }
        .error-code {
            font-size: 110px;
            font-weight: 900;
            color: #1e88e5;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 3px 3px 0 rgba(30,136,229,0.1);
        }
        h1 {
            font-size: 26px;
            margin-top: 15px;
            color: #2c3e50;
            font-weight: 700;
        }
        p {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        a.btn {
            display: inline-block;
            background: #1e88e5;
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(30,136,229,0.3);
        }
        a.btn:hover {
            background: #1565c0;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30,136,229,0.4);
        }
        .icon-lock {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            fill: #1e88e5;
        }
        .bg-shape {
            position: absolute;
            background: rgba(30,136,229,0.03);
            border-radius: 50%;
            z-index: -1;
        }
        .shape-1 { width: 300px; height: 300px; top: -100px; left: -100px; }
        .shape-2 { width: 400px; height: 400px; bottom: -150px; right: -150px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Floating abstract shapes behind -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>

        <!-- Lock SVG Icon -->
        <svg class="icon-lock" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
        </svg>
        
        <h1 class="error-code">403</h1>
        <h1>Truy Cập Bị Từ Chối</h1>
        <p>Xin lỗi, bạn không có quyền truy cập vào khu vực này.<br>Yêu cầu của bạn đã bị máy chủ từ chối vì lý do bảo mật.</p>
        <a href="/" class="btn">Trở về Trang Chủ</a>
    </div>

</body>
</html>
